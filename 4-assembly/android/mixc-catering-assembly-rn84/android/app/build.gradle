apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

import org.gradle.api.tasks.PathSensitivity

def resolveHermesCommand = {
  def hermesRoot = new File(rootProject.projectDir, "../../../../node_modules/hermes-compiler/hermesc")
  def osName = System.getProperty("os.name").toLowerCase(Locale.ROOT)
  def relativePath = osName.contains("windows")
    ? "win64-bin/hermesc.exe"
    : (osName.contains("mac") || osName.contains("darwin") ? "osx-bin/hermesc" : "linux64-bin/hermesc")
  def hermesCommandFile = new File(hermesRoot, relativePath)
  if (!hermesCommandFile.exists()) {
    throw new GradleException("Hermes compiler not found at ${hermesCommandFile}. Run `corepack yarn install` from the repo root to restore hermes-compiler binaries.")
  }
  hermesCommandFile.setExecutable(true, false)
  return hermesCommandFile.getCanonicalPath()
}

react {
  root = file("../../")
  reactNativeDir = file("../../../../../node_modules/react-native")
  codegenDir = file("../../../../../node_modules/@react-native/codegen")
  cliFile = file("../../../../../node_modules/react-native/cli.js")
  entryFile = file("../../index.js")
  hermesCommand = resolveHermesCommand()
  autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = true
def releaseStoreFile = project.findProperty("MIXC_RELEASE_STORE_FILE")
def releaseStorePassword = project.findProperty("MIXC_RELEASE_STORE_PASSWORD")
def releaseKeyAlias = project.findProperty("MIXC_RELEASE_KEY_ALIAS")
def releaseKeyPassword = project.findProperty("MIXC_RELEASE_KEY_PASSWORD")
def allowLocalReleaseDebugSigning = (
  project.findProperty("MIXC_ALLOW_LOCAL_RELEASE_DEBUG_SIGNING")?.toString() == "true" ||
  System.getenv("MIXC_ALLOW_LOCAL_RELEASE_DEBUG_SIGNING") == "true"
)
def hasReleaseSigning = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword].every {
  it != null && it.toString().trim()
}
def workspaceBundleSourceRoots = [
  new File(rootProject.projectDir, "../../../../1-kernel"),
  new File(rootProject.projectDir, "../../../../2-ui"),
]

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
  ndkVersion rootProject.ext.ndkVersion
  buildToolsVersion rootProject.ext.buildToolsVersion
  compileSdk rootProject.ext.compileSdkVersion

  namespace "com.next.mixccateringassemblyrn84"
  defaultConfig {
    applicationId "com.next.mixccateringassemblyrn84"
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    versionCode 8
    versionName "1.0.0"
  }
  signingConfigs {
    debug {
      storeFile file('debug.keystore')
      storePassword 'android'
      keyAlias 'androiddebugkey'
      keyPassword 'android'
    }
    if (hasReleaseSigning) {
      release {
        storeFile file(releaseStoreFile)
        storePassword releaseStorePassword
        keyAlias releaseKeyAlias
        keyPassword releaseKeyPassword
      }
    }
  }
  buildTypes {
    debug {
      signingConfig signingConfigs.debug
      buildConfigField "boolean", "ENABLE_HOT_UPDATE_BUNDLE_RESOLVER", (project.findProperty("enableHotUpdateResolver")?.toString() == "true").toString()
    }
    release {
      if (hasReleaseSigning) {
        signingConfig signingConfigs.release
      } else if (allowLocalReleaseDebugSigning) {
        signingConfig signingConfigs.debug
      }
      minifyEnabled enableProguardInReleaseBuilds
      buildConfigField "boolean", "ENABLE_HOT_UPDATE_BUNDLE_RESOLVER", "true"
      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
    }
  }
}

gradle.taskGraph.whenReady { taskGraph ->
  def requiresReleaseSigning = { String taskName ->
    def normalized = taskName.toLowerCase()
    return normalized in [
      "assemblerelease",
      "bundleRelease".toLowerCase(),
      "packagerelease",
      "packagereleasebundle",
      "signreleasebundle",
      "installrelease",
    ]
  }
  def releaseArtifactTaskRequested = taskGraph.allTasks.any { task ->
    task.project == project && requiresReleaseSigning(task.name)
  }
  if (releaseArtifactTaskRequested && !hasReleaseSigning && !allowLocalReleaseDebugSigning) {
    throw new GradleException("Release build requires MIXC_RELEASE_STORE_FILE / MIXC_RELEASE_STORE_PASSWORD / MIXC_RELEASE_KEY_ALIAS / MIXC_RELEASE_KEY_PASSWORD, or set MIXC_ALLOW_LOCAL_RELEASE_DEBUG_SIGNING=true for local E2E builds")
  }
}

afterEvaluate {
  tasks.matching { it.name.startsWith("createBundle") && it.name.endsWith("JsAndAssets") }.configureEach { task ->
    workspaceBundleSourceRoots.eachWithIndex { sourceRoot, index ->
      if (!sourceRoot.exists()) {
        return
      }
      // React Native's default bundle task only tracks files under the assembly root.
      // Our workspace packages are symlinked from 1-kernel/2-ui, so add them explicitly
      // to prevent stale production/OTA bundles after workspace source changes.
      task.inputs.files(project.fileTree(sourceRoot) {
        include("**/*.js")
        include("**/*.jsx")
        include("**/*.ts")
        include("**/*.tsx")
        include("**/*.json")
        exclude("**/android/**")
        exclude("**/ios/**")
        exclude("**/build/**")
        exclude("**/dist/**")
        exclude("**/coverage/**")
        exclude("**/node_modules/**")
      }).withPropertyName("workspaceBundleSourceRoot${index}")
        .withPathSensitivity(PathSensitivity.RELATIVE)
    }
  }
}

dependencies {
  implementation("com.facebook.react:react-android")
  implementation project(':adapter-android-v2')
  implementation("androidx.core:core-splashscreen:1.0.1")
  implementation("com.airbnb.android:lottie:6.7.1")
  testImplementation("junit:junit:4.13.2")

  if (hermesEnabled.toBoolean()) {
    implementation("com.facebook.react:hermes-android")
  } else {
    implementation jscFlavor
  }
}
