apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
  root = file("../../")
  reactNativeDir = file("../../node_modules/react-native")
  codegenDir = file("../../node_modules/@react-native/codegen")
  cliFile = file("../../node_modules/react-native/cli.js")
  entryFile = file("../../index.js")
  hermesCommand = new File(rootProject.projectDir, "../../../../node_modules/hermes-compiler/hermesc/osx-bin/hermesc").getCanonicalPath()
  autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = true
def releaseStoreFile = project.findProperty("MIXC_RELEASE_STORE_FILE")
def releaseStorePassword = project.findProperty("MIXC_RELEASE_STORE_PASSWORD")
def releaseKeyAlias = project.findProperty("MIXC_RELEASE_KEY_ALIAS")
def releaseKeyPassword = project.findProperty("MIXC_RELEASE_KEY_PASSWORD")
def allowLocalReleaseDebugSigning = (project.findProperty("MIXC_ALLOW_LOCAL_RELEASE_DEBUG_SIGNING")?.toString() == "true")
def hasReleaseSigning = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword].every {
  it != null && it.toString().trim()
}

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
  ndkVersion rootProject.ext.ndkVersion
  buildToolsVersion rootProject.ext.buildToolsVersion
  compileSdk rootProject.ext.compileSdkVersion

  namespace "com.impos2.mixcretailassemblyrn84"
  defaultConfig {
    applicationId "com.impos2.mixcretailassemblyrn84"
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    versionCode 2
    versionName "1.0.0"
  }
  signingConfigs {
    debug {
      storeFile file('debug.keystore')
      storePassword 'android'
      keyAlias 'androiddebugkey'
      keyPassword 'android'
    }
    if (hasReleaseSigning) {
      release {
        storeFile file(releaseStoreFile)
        storePassword releaseStorePassword
        keyAlias releaseKeyAlias
        keyPassword releaseKeyPassword
      }
    }
  }
  buildTypes {
    debug {
      signingConfig signingConfigs.debug
      buildConfigField "boolean", "ENABLE_HOT_UPDATE_BUNDLE_RESOLVER", (project.findProperty("enableHotUpdateResolver")?.toString() == "true").toString()
    }
    release {
      if (hasReleaseSigning) {
        signingConfig signingConfigs.release
      } else if (allowLocalReleaseDebugSigning) {
        signingConfig signingConfigs.debug
      }
      minifyEnabled enableProguardInReleaseBuilds
      buildConfigField "boolean", "ENABLE_HOT_UPDATE_BUNDLE_RESOLVER", "true"
      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
    }
  }
}

gradle.taskGraph.whenReady { taskGraph ->
  def requiresReleaseSigning = { String taskName ->
    def normalized = taskName.toLowerCase()
    return normalized in [
      "assemblerelease",
      "bundleRelease".toLowerCase(),
      "packagerelease",
      "packagereleasebundle",
      "signreleasebundle",
      "installrelease",
    ]
  }
  def releaseArtifactTaskRequested = taskGraph.allTasks.any { task ->
    task.project == project && requiresReleaseSigning(task.name)
  }
  if (releaseArtifactTaskRequested && !hasReleaseSigning && !allowLocalReleaseDebugSigning) {
    throw new GradleException("Release build requires MIXC_RELEASE_STORE_FILE / MIXC_RELEASE_STORE_PASSWORD / MIXC_RELEASE_KEY_ALIAS / MIXC_RELEASE_KEY_PASSWORD, or set MIXC_ALLOW_LOCAL_RELEASE_DEBUG_SIGNING=true for local E2E builds")
  }
}

dependencies {
  implementation("com.facebook.react:react-android")
  implementation project(':adapter-android-v2')
  implementation("androidx.core:core-splashscreen:1.0.1")
  testImplementation("junit:junit:4.13.2")

  if (hermesEnabled.toBoolean()) {
    implementation("com.facebook.react:hermes-android")
  } else {
    implementation jscFlavor
  }
}
