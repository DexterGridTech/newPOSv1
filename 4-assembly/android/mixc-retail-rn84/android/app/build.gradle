apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// 在 Codegen 之前，将 adapterRN84 的 Spec 文件同步到本包的 Spec 目录
def adapterSpecSrcDir = file("../../../../../3-adapter/android/adapterRN84/src/supports/apis")
def localSpecDir = file("../../src/supports/apis")

task syncAdapterSpecs(type: Copy) {
    from(adapterSpecSrcDir) {
        include "Native*TurboModule.ts"
    }
    into localSpecDir
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

afterEvaluate {
    def codegenTask = tasks.findByName("generateCodegenSchemaFromJavaScript")
    if (codegenTask != null) {
        codegenTask.dependsOn(syncAdapterSpecs)
    }
}

react {
    // app/build.gradle 位于 android/app/，以下路径均相对于此
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
    cliFile = file("../../node_modules/react-native/cli.js")
    entryFile = file("../../index.js")

    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.impos2.mixcretailrn84"
    defaultConfig {
        applicationId "com.impos2.mixcretailrn84"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    packagingOptions {
        resources {
            excludes += [
                'META-INF/INDEX.LIST',
                'META-INF/*.SF',
                'META-INF/*.DSA',
                'META-INF/*.RSA',
                'META-INF/io.netty.versions.properties'
            ]
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    }
    implementation project(':turbomodule-lib')
}
